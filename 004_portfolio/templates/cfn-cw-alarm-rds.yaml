AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudWatch Alarms for RDS - CPU and freeable memory with WARNING/CRITICAL severity levels"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-alarm-rds \
#   --template-file cfn-cw-alarm-rds.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=prd \
#     DBInstanceIdentifier=my-project-prd-rds
#
# With SNS notification (WARNING → Slack, CRITICAL → PagerDuty):
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-alarm-rds \
#   --template-file cfn-cw-alarm-rds.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=prd \
#     DBInstanceIdentifier=my-project-prd-rds \
#     WarningActionArn=$SLACK_SNS_ARN \
#     CriticalActionArn=$PAGERDUTY_SNS_ARN
#
# FreeableMemory thresholds are in bytes (alarm triggers when BELOW threshold).
# Common values:
#   db.t3.medium (4 GB RAM):  Warning=1 GB=1073741824 / Critical=512 MB=536870912
#   db.r6g.large (16 GB RAM): Warning=4 GB=4294967296 / Critical=2 GB=2147483648
# -----------------------------------------------

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters: [ProjectName, Env]
      - Label:
          default: "Target DB Instance"
        Parameters: [DBInstanceIdentifier]
      - Label:
          default: "WARNING Thresholds"
        Parameters: [CpuWarningThreshold, FreeableMemoryWarningThreshold]
      - Label:
          default: "CRITICAL Thresholds"
        Parameters: [CpuCriticalThreshold, FreeableMemoryCriticalThreshold]
      - Label:
          default: "Common"
        Parameters: [EvaluationPeriods]
      - Label:
          default: "Notifications (optional)"
        Parameters: [WarningActionArn, CriticalActionArn]

Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues: [stg, dev, prd]

  DBInstanceIdentifier:
    Type: String
    Description: "RDS DB instance identifier."

  CpuWarningThreshold:
    Type: Number
    Default: 70
    MinValue: 1
    MaxValue: 100
    Description: "CPU utilization WARNING threshold (%)."

  CpuCriticalThreshold:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 100
    Description: "CPU utilization CRITICAL threshold (%)."

  FreeableMemoryWarningThreshold:
    Type: Number
    Default: 1073741824
    MinValue: 1
    Description: "Freeable memory WARNING threshold in bytes. Triggers when memory FALLS BELOW this value. Default: 1 GB."

  FreeableMemoryCriticalThreshold:
    Type: Number
    Default: 536870912
    MinValue: 1
    Description: "Freeable memory CRITICAL threshold in bytes. Triggers when memory FALLS BELOW this value. Default: 512 MB."

  EvaluationPeriods:
    Type: Number
    Default: 3
    MinValue: 1
    Description: "Number of consecutive 1-minute periods that must breach the threshold before alarming."

  WarningActionArn:
    Type: String
    Default: ""
    Description: "SNS topic ARN for WARNING severity (e.g. Slack). Used for both ALARM and OK notifications."

  CriticalActionArn:
    Type: String
    Default: ""
    Description: "SNS topic ARN for CRITICAL severity (e.g. PagerDuty). Used for both ALARM and OK notifications."

Conditions:
  HasWarningAction:  !Not [!Equals [!Ref WarningActionArn, ""]]
  HasCriticalAction: !Not [!Equals [!Ref CriticalActionArn, ""]]

Resources:

  CpuWarningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-rds-${DBInstanceIdentifier}-cpu-warning"
      AlarmDescription: !Sub "RDS CPU > ${CpuWarningThreshold}% for ${EvaluationPeriods} x 1 min. [WARNING]"
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstanceIdentifier
      Statistic: Average
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref CpuWarningThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]
      OKActions:    !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]

  CpuCriticalAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-rds-${DBInstanceIdentifier}-cpu-critical"
      AlarmDescription: !Sub "RDS CPU > ${CpuCriticalThreshold}% for ${EvaluationPeriods} x 1 min. [CRITICAL]"
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstanceIdentifier
      Statistic: Average
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref CpuCriticalThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]
      OKActions:    !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]

  FreeableMemoryWarningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-rds-${DBInstanceIdentifier}-memory-warning"
      AlarmDescription: !Sub "RDS freeable memory < ${FreeableMemoryWarningThreshold} bytes for ${EvaluationPeriods} x 1 min. [WARNING]"
      Namespace: AWS/RDS
      MetricName: FreeableMemory
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstanceIdentifier
      Statistic: Average
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref FreeableMemoryWarningThreshold
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]
      OKActions:    !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]

  FreeableMemoryCriticalAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-rds-${DBInstanceIdentifier}-memory-critical"
      AlarmDescription: !Sub "RDS freeable memory < ${FreeableMemoryCriticalThreshold} bytes for ${EvaluationPeriods} x 1 min. [CRITICAL]"
      Namespace: AWS/RDS
      MetricName: FreeableMemory
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstanceIdentifier
      Statistic: Average
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref FreeableMemoryCriticalThreshold
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]
      OKActions:    !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]

Outputs:

  CpuWarningAlarmArn:
    Description: "CPU WARNING alarm ARN"
    Value: !GetAtt CpuWarningAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CpuWarningAlarmArn"

  CpuCriticalAlarmArn:
    Description: "CPU CRITICAL alarm ARN"
    Value: !GetAtt CpuCriticalAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CpuCriticalAlarmArn"

  FreeableMemoryWarningAlarmArn:
    Description: "Freeable memory WARNING alarm ARN"
    Value: !GetAtt FreeableMemoryWarningAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FreeableMemoryWarningAlarmArn"

  FreeableMemoryCriticalAlarmArn:
    Description: "Freeable memory CRITICAL alarm ARN"
    Value: !GetAtt FreeableMemoryCriticalAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FreeableMemoryCriticalAlarmArn"

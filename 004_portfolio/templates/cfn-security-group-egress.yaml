AWSTemplateFormatVersion: "2010-09-09"
Description: "Egress rules for an existing Security Group. Deploy after cfn-security-group.yaml."

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-sg-<SgSuffix>-egress \
#   --template-file cfn-security-group-egress.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     SgSuffix=web \
#     Egress1Port=443
#
# NOTE:
#   By default, AWS Security Groups allow all outbound traffic (0.0.0.0/0).
#   Deploy this template only when you need to restrict outbound traffic.
#   Deploying this template automatically removes the default "allow all" rule
#   and replaces it with the rules defined here.
#
# Common port examples:
#   HTTP:       80    HTTPS: 443
#   MySQL:    3306    PostgreSQL: 5432
#   SSH:        22    RDP: 3389
#
# Deploy order:
#   1. cfn-vpc.yaml
#   2. cfn-security-group.yaml         ({ProjectName}-{Env}-sg-{SgSuffix})
#   3. cfn-security-group-ingress.yaml
#   4. cfn-security-group-egress.yaml  (this template, optional)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - SgSuffix
      - Label:
          default: "Egress Rule 1 (required)"
        Parameters:
          - Egress1Port
          - Egress1Cidr
      - Label:
          default: "Egress Rule 2 (optional)"
        Parameters:
          - Egress2Port
          - Egress2Cidr
      - Label:
          default: "Egress Rule 3 (optional)"
        Parameters:
          - Egress3Port
          - Egress3Cidr

# -----------------------------------------------
# Parameters
# SecurityGroupId is imported from {ProjectName}-{Env}-sg-{SgSuffix} stack automatically.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd

  SgSuffix:
    Type: String
    Default: web
    Description: "Must match the SgSuffix used in cfn-security-group.yaml."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Egress1Port:
    Type: Number
    Default: 443
    MinValue: 0
    MaxValue: 65535
    Description: "TCP port for egress rule 1."

  Egress1Cidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: "Destination CIDR for egress rule 1."

  Egress2Port:
    Type: String
    Default: ""
    Description: "TCP port for egress rule 2. Leave empty to disable."
    AllowedPattern: "^([0-9]{1,5})?$"
    ConstraintDescription: "Port number (0-65535) or empty to disable."

  Egress2Cidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: "Destination CIDR for egress rule 2."

  Egress3Port:
    Type: String
    Default: ""
    Description: "TCP port for egress rule 3. Leave empty to disable."
    AllowedPattern: "^([0-9]{1,5})?$"
    ConstraintDescription: "Port number (0-65535) or empty to disable."

  Egress3Cidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: "Destination CIDR for egress rule 3."

# -----------------------------------------------
# Conditions
# -----------------------------------------------
Conditions:
  HasEgress02: !Not [!Equals [!Ref Egress2Port, ""]]
  HasEgress03: !Not [!Equals [!Ref Egress3Port, ""]]

# -----------------------------------------------
# Resources
# AWS::EC2::SecurityGroupEgress adds rules to an existing SG without modifying it.
# Conditional resources (EgressRule02 / EgressRule03) are skipped when port is empty.
# -----------------------------------------------
Resources:
  EgressRule01:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}-SecurityGroupId"
      IpProtocol: tcp
      FromPort: !Ref Egress1Port
      ToPort: !Ref Egress1Port
      CidrIp: !Ref Egress1Cidr
      Description: !Sub "Rule 1: port ${Egress1Port} to ${Egress1Cidr}"

  EgressRule02:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasEgress02
    Properties:
      GroupId:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}-SecurityGroupId"
      IpProtocol: tcp
      FromPort: !Ref Egress2Port
      ToPort: !Ref Egress2Port
      CidrIp: !Ref Egress2Cidr
      Description: !Sub "Rule 2: port ${Egress2Port} to ${Egress2Cidr}"

  EgressRule03:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: HasEgress03
    Properties:
      GroupId:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}-SecurityGroupId"
      IpProtocol: tcp
      FromPort: !Ref Egress3Port
      ToPort: !Ref Egress3Port
      CidrIp: !Ref Egress3Cidr
      Description: !Sub "Rule 3: port ${Egress3Port} to ${Egress3Cidr}"

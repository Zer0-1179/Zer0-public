<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - ページが見つかりません | Zer0_Infra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0a1628;
      color: #e2e8f0;
      font-family: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background-image: linear-gradient(to right, #1e3a5f18 1px, transparent 1px),
                        linear-gradient(to bottom, #1e3a5f18 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.875rem;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 9999px;
      font-size: 0.75rem;
      color: #60a5fa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .dot {
      width: 6px; height: 6px;
      background: #60a5fa;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .code {
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 700;
      color: #60a5fa;
      line-height: 1;
      letter-spacing: -0.05em;
      font-family: 'Inter', monospace;
    }
    .title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 1rem;
      color: #cbd5e1;
    }
    .message {
      color: #64748b;
      margin-top: 0.625rem;
      font-size: 0.9rem;
      line-height: 1.7;
      max-width: 360px;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-primary {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background: #60a5fa;
      color: #0a1628;
      text-decoration: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #93c5fd; }
    .btn-secondary {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      border: 1px solid #1e3a5f;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: #60a5fa; color: #60a5fa; }
  </style>
</head>
<body>
  <div class="badge"><span class="dot"></span>Error</div>
  <div class="code">404</div>
  <div class="title">ページが見つかりません</div>
  <p class="message">お探しのページは存在しないか、移動した可能性があります。</p>
  <div class="actions">
    <a href="/ja/" class="btn-primary">ホームへ戻る</a>
    <a href="/ja/projects/" class="btn-secondary">実績を見る</a>
  </div>
</body>
</html>

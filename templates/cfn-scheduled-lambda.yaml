AWSTemplateFormatVersion: "2010-09-09"
Description: "Scheduled Lambda with EventBridge, SSM Parameter Store, and Amazon Bedrock access"

# ============================================================
# USAGE
# ============================================================
# 1. Set ProjectName (e.g. my-bot)
# 2. Set SsmPrefix (e.g. /my-bot) - SSM paths used by your Lambda
# 3. Adjust Schedule1 / Schedule2 in UTC (JST = UTC+9)
#    Example: 09:00 JST = cron(0 0 * * ? *)
#             20:00 JST = cron(0 11 * * ? *)
# 4. Deploy:
#    aws cloudformation deploy \
#      --stack-name <your-stack-name> \
#      --template-file cfn-scheduled-lambda.yaml \
#      --capabilities CAPABILITY_NAMED_IAM \
#      --parameter-overrides \
#        ProjectName=my-bot \
#        SsmPrefix=/my-bot
# 5. Update Lambda code:
#    zip lambda.zip lambda_function.py
#    aws lambda update-function-code \
#      --function-name my-bot \
#      --zip-file fileb://lambda.zip
# ============================================================

Parameters:
  ProjectName:
    Type: String
    Description: "Unique project name used for all resource naming (lowercase, hyphens allowed)"
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only"

  SsmPrefix:
    Type: String
    Description: "SSM Parameter Store path prefix (e.g. /my-bot)"
    AllowedPattern: "^/[a-zA-Z0-9/_-]+$"

  LambdaRuntime:
    Type: String
    Default: python3.13
    AllowedValues:
      - python3.13
      - python3.12
      - python3.11
      - nodejs22.x
      - nodejs20.x
    Description: "Lambda runtime"

  Schedule1:
    Type: String
    Default: "cron(0 0 * * ? *)"
    Description: "First EventBridge schedule (UTC). Default: 09:00 JST"

  Schedule2:
    Type: String
    Default: "cron(0 11 * * ? *)"
    Description: "Second EventBridge schedule (UTC). Default: 20:00 JST. Leave empty to disable"

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 7, 14, 30, 60, 90]
    Description: "CloudWatch Logs retention period (days)"

Conditions:
  HasSchedule2: !Not [!Equals [!Ref Schedule2, ""]]

Resources:

  # ── Lambda Execution Role ─────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-role"
      Description: !Sub "Lambda execution role for ${ProjectName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ssm-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:PutParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmPrefix}/*"
        - PolicyName: bedrock-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"

  # ── Lambda Function ───────────────────────────────────────
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref ProjectName
      Description: !Sub "Scheduled Lambda function for ${ProjectName}"
      Runtime: !Ref LambdaRuntime
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          SSM_PREFIX: !Ref SsmPrefix
          PROJECT_NAME: !Ref ProjectName
      Code:
        # Replace with your actual Lambda code via:
        # aws lambda update-function-code --function-name <ProjectName> --zip-file fileb://lambda.zip
        ZipFile: |
          def lambda_handler(event, context):
              print(f"Hello from {context.function_name}")
              return {"statusCode": 200, "body": "OK"}

  # ── CloudWatch Logs ───────────────────────────────────────
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction}"
      RetentionInDays: !Ref LogRetentionDays

  # ── EventBridge Schedule 1 ────────────────────────────────
  Schedule1Rule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-schedule-1"
      Description: !Sub "Schedule 1 for ${ProjectName}"
      ScheduleExpression: !Ref Schedule1
      State: ENABLED
      Targets:
        - Id: Schedule1Target
          Arn: !GetAtt LambdaFunction.Arn

  Schedule1Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt Schedule1Rule.Arn

  # ── EventBridge Schedule 2 (optional) ────────────────────
  Schedule2Rule:
    Type: AWS::Events::Rule
    Condition: HasSchedule2
    Properties:
      Name: !Sub "${ProjectName}-schedule-2"
      Description: !Sub "Schedule 2 for ${ProjectName}"
      ScheduleExpression: !Ref Schedule2
      State: ENABLED
      Targets:
        - Id: Schedule2Target
          Arn: !GetAtt LambdaFunction.Arn

  Schedule2Permission:
    Type: AWS::Lambda::Permission
    Condition: HasSchedule2
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt Schedule2Rule.Arn

Outputs:
  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref LambdaFunction

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn

  LambdaRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaRole.Arn

  CloudWatchLogsGroup:
    Description: CloudWatch Logs group name
    Value: !Ref LambdaLogGroup

AWSTemplateFormatVersion: "2010-09-09"
Description: "ECS Fargate cluster with Container Insights and FARGATE/FARGATE_SPOT capacity providers"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-cluster \
#   --template-file cfn-ecs-cluster.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev
#
# Deploy order:
#   1. cfn-ecs-cluster.yaml (this template — no dependencies)
#   Next: cfn-ecs-service.yaml (imports ClusterName from this stack)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
      - Label:
          default: "Observability"
        Parameters:
          - ContainerInsights

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prd

  ContainerInsights:
    Type: String
    Default: enabled
    AllowedValues:
      - enabled
      - disabled
    Description: "Enable CloudWatch Container Insights for metrics and logs. Incurs additional CloudWatch costs."

# -----------------------------------------------
# Resources
# -----------------------------------------------
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-${Env}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: !Ref ContainerInsights
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-cluster"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  ClusterName:
    Description: "ECS cluster name"
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ClusterArn:
    Description: "ECS cluster ARN"
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudWatch Alarms for SQS - visible message count and oldest message age with WARNING/CRITICAL severity levels"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-alarm-sqs-<QueueAlias> \
#   --template-file cfn-cw-alarm-sqs.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=prd \
#     QueueName=my-project-prd-orders
#
# With SNS notification (WARNING → Slack, CRITICAL → PagerDuty):
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-alarm-sqs-orders \
#   --template-file cfn-cw-alarm-sqs.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=prd \
#     QueueName=my-project-prd-orders \
#     WarningActionArn=$SLACK_SNS_ARN \
#     CriticalActionArn=$PAGERDUTY_SNS_ARN
#
# NOTE: QueueName is the SQS queue name, not the URL or ARN.
#       For FIFO queues, include the .fifo suffix (e.g. my-queue.fifo).
#
# MessageAge thresholds are in seconds.
# Tune them to match your expected consumer processing SLA.
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# ParameterGroups groups parameters visually.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
      - Label:
          default: "Target Queue"
        Parameters:
          - QueueName
      - Label:
          default: "WARNING Thresholds"
        Parameters:
          - MessageCountWarningThreshold
          - MessageAgeWarningThreshold
      - Label:
          default: "CRITICAL Thresholds"
        Parameters:
          - MessageCountCriticalThreshold
          - MessageAgeCriticalThreshold
      - Label:
          default: "Common"
        Parameters:
          - EvaluationPeriods
      - Label:
          default: "Notifications (optional)"
        Parameters:
          - WarningActionArn
          - CriticalActionArn

# -----------------------------------------------
# Parameters
# Values passed in at deploy time.
# AllowedValues restricts accepted input.
# Default sets the fallback value when omitted.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd

  QueueName:
    Type: String
    Description: "SQS queue name (not URL or ARN). For FIFO queues, include the .fifo suffix."

  MessageCountWarningThreshold:
    Type: Number
    Default: 50
    MinValue: 1
    Description: "Visible message count WARNING threshold. Triggers when queue depth exceeds this value."

  MessageCountCriticalThreshold:
    Type: Number
    Default: 200
    MinValue: 1
    Description: "Visible message count CRITICAL threshold."

  MessageAgeWarningThreshold:
    Type: Number
    Default: 180
    MinValue: 1
    Description: "Oldest message age WARNING threshold in seconds. Default: 180 s (3 min)."

  MessageAgeCriticalThreshold:
    Type: Number
    Default: 600
    MinValue: 1
    Description: "Oldest message age CRITICAL threshold in seconds. Default: 600 s (10 min)."

  EvaluationPeriods:
    Type: Number
    Default: 3
    MinValue: 1
    Description: "Number of consecutive 1-minute periods that must breach the threshold before alarming."

  WarningActionArn:
    Type: String
    Default: ""
    Description: "SNS topic ARN for WARNING severity (e.g. Slack). Used for both ALARM and OK notifications."

  CriticalActionArn:
    Type: String
    Default: ""
    Description: "SNS topic ARN for CRITICAL severity (e.g. PagerDuty). Used for both ALARM and OK notifications."

# -----------------------------------------------
# Conditions
# Boolean flags derived from parameter values.
# Used in Resources and Properties via: !If [ConditionName, IfTrue, IfFalse]
# -----------------------------------------------
Conditions:
  HasWarningAction:  !Not [!Equals [!Ref WarningActionArn, ""]]
  HasCriticalAction: !Not [!Equals [!Ref CriticalActionArn, ""]]

# -----------------------------------------------
# Resources
# -----------------------------------------------
Resources:

  MessageCountWarningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-sqs-${QueueName}-depth-warning"
      AlarmDescription: !Sub "SQS visible messages > ${MessageCountWarningThreshold} for ${EvaluationPeriods} x 1 min. [WARNING]"
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Ref QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref MessageCountWarningThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]
      OKActions:    !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]

  MessageCountCriticalAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-sqs-${QueueName}-depth-critical"
      AlarmDescription: !Sub "SQS visible messages > ${MessageCountCriticalThreshold} for ${EvaluationPeriods} x 1 min. [CRITICAL]"
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Ref QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref MessageCountCriticalThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]
      OKActions:    !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]

  MessageAgeWarningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-sqs-${QueueName}-age-warning"
      AlarmDescription: !Sub "SQS oldest message age > ${MessageAgeWarningThreshold} s for ${EvaluationPeriods} x 1 min. [WARNING]"
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !Ref QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref MessageAgeWarningThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]
      OKActions:    !If [HasWarningAction,  [!Ref WarningActionArn],  !Ref AWS::NoValue]

  MessageAgeCriticalAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Env}-sqs-${QueueName}-age-critical"
      AlarmDescription: !Sub "SQS oldest message age > ${MessageAgeCriticalThreshold} s for ${EvaluationPeriods} x 1 min. [CRITICAL]"
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !Ref QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref MessageAgeCriticalThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]
      OKActions:    !If [HasCriticalAction, [!Ref CriticalActionArn], !Ref AWS::NoValue]

# -----------------------------------------------
# Outputs
# Values available after stack creation.
# Export allows other stacks to reference via !ImportValue.
# -----------------------------------------------
Outputs:

  MessageCountWarningAlarmArn:
    Description: "Message count WARNING alarm ARN"
    Value: !GetAtt MessageCountWarningAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-MessageCountWarningAlarmArn"

  MessageCountCriticalAlarmArn:
    Description: "Message count CRITICAL alarm ARN"
    Value: !GetAtt MessageCountCriticalAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-MessageCountCriticalAlarmArn"

  MessageAgeWarningAlarmArn:
    Description: "Message age WARNING alarm ARN"
    Value: !GetAtt MessageAgeWarningAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-MessageAgeWarningAlarmArn"

  MessageAgeCriticalAlarmArn:
    Description: "Message age CRITICAL alarm ARN"
    Value: !GetAtt MessageAgeCriticalAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-MessageAgeCriticalAlarmArn"

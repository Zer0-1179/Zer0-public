AWSTemplateFormatVersion: "2010-09-09"
Description: "Network Load Balancer with Target Group. Supports TCP, UDP, TLS, and TCP_UDP."

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-nlb-<NlbSuffix> \
#   --template-file cfn-nlb.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     SgSuffix=web \
#     NlbSuffix=tcp \
#     Protocol=TCP \
#     Port=80
#
# With TLS (ACM certificate ARN required):
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     SgSuffix=web \
#     NlbSuffix=tls \
#     Protocol=TLS \
#     Port=443 \
#     CertificateArn=arn:aws:acm:ap-northeast-1:123456789012:certificate/xxxx
#
# NlbSuffix examples: tcp, udp, tls, 01, 02
# NOTE: NLB name and Target Group name are limited to 32 characters.
#
# Deploy order:
#   1. cfn-vpc.yaml
#   2. cfn-igw.yaml                    (internet-facing only)
#   3. cfn-security-group.yaml
#   4. cfn-security-group-ingress.yaml (open the listener port)
#   5. cfn-nlb.yaml                    (this template)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - SgSuffix
          - NlbSuffix
          - Scheme
      - Label:
          default: "Listener"
        Parameters:
          - Protocol
          - Port
      - Label:
          default: "Target Group"
        Parameters:
          - TargetType
          - TargetPort
      - Label:
          default: "TLS (required when Protocol=TLS)"
        Parameters:
          - CertificateArn
    ParameterLabels:
      ProjectName:
        default: "Project Name (must match VPC / SG stack)"
      Env:
        default: "Environment (must match VPC / SG stack)"
      SgSuffix:
        default: "SG Suffix (must match the SG stack)"
      NlbSuffix:
        default: "NLB Suffix — purpose or sequence (e.g. tcp, udp, 01)"
      Scheme:
        default: "Scheme"
      Protocol:
        default: "Listener Protocol"
      Port:
        default: "Listener Port"
      TargetType:
        default: "Target Type"
      TargetPort:
        default: "Target Port (port your backend listens on)"
      CertificateArn:
        default: "ACM Certificate ARN (required when Protocol=TLS)"

# -----------------------------------------------
# Parameters
# VpcId and SubnetIds are imported from {ProjectName}-{Env}-vpc stack automatically.
# SecurityGroupId is imported from {ProjectName}-{Env}-sg-{SgSuffix} stack automatically.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prd

  SgSuffix:
    Type: String
    Default: web
    Description: "Must match the SgSuffix used in cfn-security-group.yaml (e.g. web)."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  NlbSuffix:
    Type: String
    Default: "01"
    Description: "Purpose or sequence identifier for this NLB (e.g. tcp, udp, 01). Used in resource names and stack exports."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Scheme:
    Type: String
    Default: internet-facing
    AllowedValues:
      - internet-facing
      - internal
    Description: "internet-facing uses public subnets. internal uses private subnets."

  Protocol:
    Type: String
    Default: TCP
    AllowedValues:
      - TCP
      - UDP
      - TLS
      - TCP_UDP
    Description: "Listener protocol. Use TLS to terminate TLS at the NLB (requires CertificateArn)."

  Port:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 65535
    Description: "Listener port."

  TargetType:
    Type: String
    Default: instance
    AllowedValues:
      - instance
      - ip
    Description: "instance: target by EC2 instance ID. ip: target by IP address (e.g. ECS Fargate)."

  TargetPort:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 65535
    Description: "Port your backend (EC2 / container) listens on."

  CertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN. Required when Protocol=TLS."

# -----------------------------------------------
# Conditions
# -----------------------------------------------
Conditions:
  IsInternetFacing: !Equals [!Ref Scheme, "internet-facing"]
  HasTls: !Equals [!Ref Protocol, "TLS"]

# -----------------------------------------------
# Resources
# -----------------------------------------------
Resources:
  # TLS is terminated at the NLB; backend receives plain TCP.
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-${Env}-nlb-${NlbSuffix}-tg"
      VpcId:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-VpcId"
      Protocol: !If [HasTls, TCP, !Ref Protocol]
      Port: !Ref TargetPort
      TargetType: !Ref TargetType
      HealthCheckEnabled: true
      HealthCheckProtocol: TCP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-nlb-${NlbSuffix}-tg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-${Env}-nlb-${NlbSuffix}"
      Type: network
      Scheme: !Ref Scheme
      SecurityGroups:
        - Fn::ImportValue: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}-SecurityGroupId"
      Subnets:
        - !If
          - IsInternetFacing
          - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PublicSubnet01Id"
          - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PrivateSubnet01Id"
        - !If
          - IsInternetFacing
          - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PublicSubnet02Id"
          - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PrivateSubnet02Id"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-nlb-${NlbSuffix}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: !Ref Port
      Protocol: !Ref Protocol
      SslPolicy: !If [HasTls, ELBSecurityPolicy-TLS13-1-2-2021-06, !Ref AWS::NoValue]
      Certificates: !If
        - HasTls
        - - CertificateArn: !Ref CertificateArn
        - !Ref AWS::NoValue
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  LoadBalancerArn:
    Description: "NLB ARN"
    Value: !Ref LoadBalancer
    Export:
      Name: !Sub "${ProjectName}-${Env}-nlb-${NlbSuffix}-LoadBalancerArn"

  LoadBalancerDnsName:
    Description: "NLB DNS name"
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub "${ProjectName}-${Env}-nlb-${NlbSuffix}-LoadBalancerDnsName"

  TargetGroupArn:
    Description: "Target Group ARN"
    Value: !Ref TargetGroup
    Export:
      Name: !Sub "${ProjectName}-${Env}-nlb-${NlbSuffix}-TargetGroupArn"

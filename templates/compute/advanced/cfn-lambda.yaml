AWSTemplateFormatVersion: "2010-09-09"
Description: "General-purpose Lambda function with execution role and CloudWatch Logs"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-lambda-<FunctionSuffix> \
#   --template-file cfn-lambda.yaml \
#   --capabilities CAPABILITY_NAMED_IAM \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     FunctionSuffix=api
#
# FunctionSuffix examples: api, worker, batch, notify, 01
#
# Update Lambda code after deploy:
#   zip lambda.zip index.py
#   aws lambda update-function-code \
#     --function-name my-project-dev-lambda-api \
#     --zip-file fileb://lambda.zip
#
# Deploy order:
#   1. cfn-lambda.yaml (this template — no dependencies)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - FunctionSuffix
      - Label:
          default: "Runtime"
        Parameters:
          - Runtime
          - Handler
          - Timeout
          - MemorySize
      - Label:
          default: "Logs"
        Parameters:
          - LogRetentionDays
      - Label:
          default: "Permissions (optional)"
        Parameters:
          - AdditionalPolicy01
          - AdditionalPolicy02

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd

  FunctionSuffix:
    Type: String
    Default: fn
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Purpose identifier for this function (e.g. api, worker, batch, 01)."

  Runtime:
    Type: String
    Default: python3.13
    AllowedValues:
      - python3.13
      - python3.12
      - nodejs22.x
      - nodejs20.x
    Description: "Lambda runtime."

  Handler:
    Type: String
    Default: index.lambda_handler
    Description: "Handler in the format filename.function_name. Use index.lambda_handler for inline ZipFile code."

  Timeout:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 900
    Description: "Function timeout in seconds (max 900)."

  MemorySize:
    Type: Number
    Default: 128
    AllowedValues:
      - 128
      - 256
      - 512
      - 1024
      - 2048
      - 3008
    Description: "Memory allocated to the function in MB."

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues:
      - 1
      - 3
      - 7
      - 14
      - 30
      - 60
      - 90
      - 180
      - 365
    Description: "CloudWatch Logs retention period in days."

  AdditionalPolicy01:
    Type: String
    Default: ""
    Description: "Optional managed policy ARN to attach to the execution role (e.g. arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess)."

  AdditionalPolicy02:
    Type: String
    Default: ""
    Description: "Optional second managed policy ARN to attach to the execution role."

# -----------------------------------------------
# Conditions
# -----------------------------------------------
Conditions:
  HasPolicy01: !Not [!Equals [!Ref AdditionalPolicy01, ""]]
  HasPolicy02: !Not [!Equals [!Ref AdditionalPolicy02, ""]]

# -----------------------------------------------
# Resources
# -----------------------------------------------
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Env}-lambda-${FunctionSuffix}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns: !If
        - HasPolicy01
        - !If
          - HasPolicy02
          - - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            - !Ref AdditionalPolicy01
            - !Ref AdditionalPolicy02
          - - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            - !Ref AdditionalPolicy01
        - - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Env}-lambda-${FunctionSuffix}"
      Description: !Sub "Lambda function for ${ProjectName}-${Env}-${FunctionSuffix}"
      Runtime: !Ref Runtime
      Handler: !Ref Handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref Timeout
      MemorySize: !Ref MemorySize
      Code:
        # Replace the inline code below with your own logic.
        # After deploy, update with:
        #   zip lambda.zip lambda_function.py
        #   aws lambda update-function-code --function-name <FunctionName> --zip-file fileb://lambda.zip
        ZipFile: |
          def lambda_handler(event, context):
              print("Hello from Lambda")
              return {"statusCode": 200, "body": "OK"}
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  FunctionName:
    Description: "Lambda function name"
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-FunctionName"

  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  RoleArn:
    Description: "Lambda execution role ARN"
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"

  LogGroupName:
    Description: "CloudWatch Log Group name"
    Value: !Ref LogGroup
    Export:
      Name: !Sub "${AWS::StackName}-LogGroupName"

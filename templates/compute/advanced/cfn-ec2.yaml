AWSTemplateFormatVersion: "2010-09-09"
Description: "EC2 instance with IAM role (SSM + CloudWatch), configurable OS, subnet placement and optional key pair"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-ec2 \
#   --template-file cfn-ec2.yaml \
#   --capabilities CAPABILITY_NAMED_IAM \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     SgSuffix=web
#
# Prerequisites (stack names must follow convention):
#   VPC:  {ProjectName}-{Env}-vpc
#   SG:   {ProjectName}-{Env}-sg-{SgSuffix}
#
# Deploy order:
#   1. cfn-vpc.yaml
#   2. cfn-igw.yaml                   (if SubnetType=Public)
#   3. cfn-security-group.yaml
#   4. cfn-security-group-ingress.yaml
#   5. cfn-ec2.yaml                   (this template)
#
# Connect via SSM Session Manager (no SSH key needed):
#   aws ssm start-session --target <InstanceId>
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - SgSuffix
      - Label:
          default: "Subnet Placement"
        Parameters:
          - SubnetType
          - SubnetNumber
      - Label:
          default: "Instance"
        Parameters:
          - OsType
          - AmiId
          - InstanceType
          - KeyName
      - Label:
          default: "Storage"
        Parameters:
          - VolumeSize
          - VolumeType

# -----------------------------------------------
# Parameters
# Subnet and SG IDs are imported automatically using ProjectName + Env + SgSuffix.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    Description: "Used as the Name tag prefix. Lowercase letters, numbers, and hyphens only."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "Deployment environment."

  SgSuffix:
    Type: String
    Default: web
    Description: "Must match the SgSuffix used in cfn-security-group.yaml (e.g. web, bastion)."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  SubnetType:
    Type: String
    Default: Private
    AllowedValues:
      - Public
      - Private
    Description: "Place the instance in a public or private subnet."

  SubnetNumber:
    Type: String
    Default: "01"
    AllowedValues:
      - "01"
      - "02"
    Description: "AZ selector. 01 = first AZ (ap-northeast-1a), 02 = second AZ (ap-northeast-1c)."

  OsType:
    Type: String
    Default: Linux
    AllowedValues:
      - Linux
      - RHEL
      - Windows
    Description: "Linux: latest Amazon Linux 2023. RHEL: specify AmiId. Windows: latest Windows Server 2022."

  AmiId:
    Type: String
    Default: ""
    Description: "AMI ID (required when OsType=RHEL, e.g. ami-xxxxxxxxxxxxxxxxx). Ignored for Linux and Windows."

  InstanceType:
    Type: String
    Default: t3.micro
    Description: "EC2 instance type."

  KeyName:
    Type: String
    Default: ""
    Description: "EC2 Key Pair name for SSH access. Leave empty to connect via SSM Session Manager only."

  VolumeSize:
    Type: Number
    Default: 20
    MinValue: 8
    MaxValue: 16384
    Description: "Root EBS volume size in GiB. Windows Server requires 30 GiB minimum."

  VolumeType:
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - gp2
    Description: "Root EBS volume type. gp3 is recommended."

# -----------------------------------------------
# Conditions
# -----------------------------------------------
Conditions:
  IsLinux:   !Equals [!Ref OsType, "Linux"]
  IsWindows: !Equals [!Ref OsType, "Windows"]
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

# -----------------------------------------------
# Resources
# SubnetType and SubnetNumber are interpolated into the export name
# to select the correct subnet (e.g. PublicSubnet01Id, PrivateSubnet02Id).
# SG is resolved from {ProjectName}-{Env}-sg-{SgSuffix} stack.
# -----------------------------------------------
Resources:
  Ec2InstanceRole01:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Env}-ec2-role"
      Description: "EC2 instance role for SSM Session Manager and CloudWatch Agent"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  Ec2InstanceProfile01:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-${Env}-ec2-profile"
      Roles:
        - !Ref Ec2InstanceRole01

  Ec2Instance01:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !If
        - IsLinux
        - "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        - !If
          - IsWindows
          - "{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base}}"
          - !Ref AmiId
      SubnetId:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-${SubnetType}Subnet${SubnetNumber}Id"
      SecurityGroupIds:
        - Fn::ImportValue: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}-SecurityGroupId"
      IamInstanceProfile: !Ref Ec2InstanceProfile01
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      BlockDeviceMappings:
        - DeviceName: !If [IsLinux, /dev/xvda, /dev/sda1]
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: !Ref VolumeType
            Encrypted: true
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-ec2"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  Ec2InstanceId01:
    Description: "EC2 Instance ID"
    Value: !Ref Ec2Instance01
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  PrivateIp01:
    Description: "Private IP address"
    Value: !GetAtt Ec2Instance01.PrivateIp
    Export:
      Name: !Sub "${AWS::StackName}-PrivateIp"

  PublicIp01:
    Description: "Public IP address (empty if placed in a private subnet)"
    Value: !GetAtt Ec2Instance01.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}-PublicIp"

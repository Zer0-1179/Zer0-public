AWSTemplateFormatVersion: "2010-09-09"
Description: "Lambda function with execution role and CloudWatch Logs"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-lambda-<FunctionSuffix> \
#   --template-file cfn-lambda-basic.yaml \
#   --capabilities CAPABILITY_NAMED_IAM \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     FunctionSuffix=api
#
# Update Lambda code after deploy:
#   zip lambda.zip index.py
#   aws lambda update-function-code \
#     --function-name my-project-dev-lambda-api \
#     --zip-file fileb://lambda.zip
#
# Deploy order:
#   1. cfn-lambda-basic.yaml (this template — no dependencies)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - FunctionSuffix
      - Label:
          default: "Runtime"
        Parameters:
          - Runtime
          - Timeout
          - MemorySize
      - Label:
          default: "Logs"
        Parameters:
          - LogRetentionDays

# -----------------------------------------------
# Parameters
# Values passed in at deploy time.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "Deployment environment."

  FunctionSuffix:
    Type: String
    Default: fn
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Purpose identifier for this function (e.g. api, worker, batch, 01)."

  Runtime:
    Type: String
    Default: python3.13
    AllowedValues:
      - python3.13
      - python3.12
      - nodejs22.x
      - nodejs20.x
    Description: "Lambda runtime."

  Timeout:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 900
    Description: "Function timeout in seconds (max 900)."

  MemorySize:
    Type: Number
    Default: 128
    AllowedValues:
      - 128
      - 256
      - 512
      - 1024
      - 2048
      - 3008
    Description: "Memory allocated to the function in MB."

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues:
      - 1
      - 3
      - 7
      - 14
      - 30
      - 60
      - 90
      - 180
      - 365
    Description: "CloudWatch Logs retention period in days."

# -----------------------------------------------
# Resources
# AWSLambdaBasicExecutionRole allows writing to CloudWatch Logs.
# To grant additional permissions, attach managed policies to
# LambdaExecutionRole by adding them to ManagedPolicyArns.
# -----------------------------------------------
Resources:
  LambdaExecutionRole01:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Env}-lambda-${FunctionSuffix}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  LambdaFunction01:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Env}-lambda-${FunctionSuffix}"
      Description: !Sub "Lambda function for ${ProjectName}-${Env}-${FunctionSuffix}"
      Runtime: !Ref Runtime
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole01.Arn
      Timeout: !Ref Timeout
      MemorySize: !Ref MemorySize
      Code:
        # Replace the inline code below with your own logic.
        # After deploy, update with:
        #   zip lambda.zip index.py
        #   aws lambda update-function-code --function-name <FunctionName> --zip-file fileb://lambda.zip
        ZipFile: |
          def lambda_handler(event, context):
              print("Hello from Lambda")
              return {"statusCode": 200, "body": "OK"}
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  LogGroup01:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction01}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  FunctionName01:
    Description: "Lambda function name"
    Value: !Ref LambdaFunction01
    Export:
      Name: !Sub "${AWS::StackName}-FunctionName"

  FunctionArn01:
    Description: "Lambda function ARN"
    Value: !GetAtt LambdaFunction01.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  RoleArn01:
    Description: "Lambda execution role ARN"
    Value: !GetAtt LambdaExecutionRole01.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"

  LogGroupName01:
    Description: "CloudWatch Log Group name"
    Value: !Ref LogGroup01
    Export:
      Name: !Sub "${AWS::StackName}-LogGroupName"

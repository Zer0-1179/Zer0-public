AWSTemplateFormatVersion: "2010-09-09"
Description: "S3 Bucket with environment-based configuration (versioning, encryption, lifecycle, tags)"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# Using AWS managed key (default):
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-s3 \
#   --template-file cfn-s3-bucket.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev
#
# Using a customer-managed KMS key (from cfn-kms-key stack):
# KMS_ARN=$(aws cloudformation describe-stacks \
#   --stack-name <ProjectName>-<Env>-kms \
#   --query "Stacks[0].Outputs[?OutputKey=='KmsKeyArn'].OutputValue" \
#   --output text)
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-s3 \
#   --template-file cfn-s3-bucket.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=prd \
#     KmsKeyId=$KMS_ARN
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# ParameterGroups groups parameters visually.
# ParameterLabels overrides the display name shown to users.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
      - Label:
          default: "Encryption (optional)"
        Parameters:
          - KmsKeyId
      - Label:
          default: "Optional"
        Parameters:
          - BucketSuffix
    ParameterLabels:
      ProjectName:
        default: "Project Name (lowercase, numbers, hyphens)"
      Env:
        default: "Environment"
      KmsKeyId:
        default: "KMS Key ARN or ID (leave empty to use AES256)"
      BucketSuffix:
        default: "Bucket Name Suffix (optional)"

# -----------------------------------------------
# Parameters
# Values passed in at deploy time.
# AllowedValues restricts accepted input.
# Default sets the fallback value when omitted.
# NoEcho: true hides the value in the console and CLI output.
# AWS-specific types (e.g. AWS::EC2::VPC::Id) show dropdowns in the console.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    Description: "Used as the bucket name prefix. Lowercase letters, numbers, and hyphens only."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prd
    Description: "Deployment environment. prd enables versioning and sets DeletionPolicy to Retain."

  KmsKeyId:
    Type: String
    Default: ""
    Description: "KMS Key ARN or ID. Leave empty to use the AWS managed key (aws/s3)."

  BucketSuffix:
    Type: String
    Default: ""
    Description: "Optional suffix appended to the bucket name (e.g. data, logs)."

# -----------------------------------------------
# Mappings
# Static lookup table for env-specific values.
# Reference with: !FindInMap [TableName, Key, Item]
# -----------------------------------------------
Mappings:
  Config:
    dev:
      VersioningStatus: Suspended  # Versioning disabled for dev
      ExpirationDays:   90         # Auto-delete objects after 90 days
    prd:
      VersioningStatus: Enabled    # Versioning enabled for prd
      ExpirationDays:   365        # Auto-delete objects after 365 days

# -----------------------------------------------
# Conditions
# Boolean flags derived from parameter values.
# Supports AND / OR / NOT for complex logic.
# Used in Resources and Properties via: !If [ConditionName, IfTrue, IfFalse]
# -----------------------------------------------
Conditions:
  IsPrd:     !Equals [!Ref Env, prd]
  HasSuffix: !Not [!Equals [!Ref BucketSuffix, ""]]
  HasKmsKey: !Not [!Equals [!Ref KmsKeyId, ""]]

# -----------------------------------------------
# Resources
# AWS resources to create.
# DeletionPolicy: Retain (prd) keeps the bucket after stack deletion.
#                 Delete (dev) removes the bucket with the stack.
# Pseudo parameters like AWS::StackName and AWS::Region
# are available without defining them in Parameters.
# -----------------------------------------------
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy:      !If [IsPrd, Retain, Delete]
    UpdateReplacePolicy: !If [IsPrd, Retain, Delete]
    Properties:
      BucketName: !If
        - HasSuffix
        - !Sub "${ProjectName}-${Env}-${BucketSuffix}"
        - !Sub "${ProjectName}-${Env}"
      VersioningConfiguration:
        Status: !FindInMap [Config, !Ref Env, VersioningStatus]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm:   "aws:kms"
              KMSMasterKeyID: !If [HasKmsKey, !Ref KmsKeyId, !Ref AWS::NoValue]
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       true
        BlockPublicPolicy:     true
        IgnorePublicAcls:      true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: auto-expire
            Status: Enabled
            ExpirationInDays: !FindInMap [Config, !Ref Env, ExpirationDays]
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env
        - Key: Region
          Value: !Ref AWS::Region

# -----------------------------------------------
# Outputs
# Values available after stack creation.
# Export allows other stacks to reference via !ImportValue.
# -----------------------------------------------
Outputs:
  BucketName:
    Description: "S3 bucket name"
    Value: !Ref S3Bucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  BucketArn:
    Description: "S3 bucket ARN"
    Value: !GetAtt S3Bucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"

  EncryptionType:
    Description: "Server-side encryption type (always aws:kms)"
    Value: !If [HasKmsKey, "aws:kms (customer managed key)", "aws:kms (AWS managed key)"]

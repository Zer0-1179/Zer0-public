AWSTemplateFormatVersion: "2010-09-09"
Description: "ECS Fargate service with task definition, execution role, and ALB integration"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-ecs-<ServiceSuffix> \
#   --template-file cfn-ecs-service.yaml \
#   --capabilities CAPABILITY_NAMED_IAM \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     ServiceSuffix=api \
#     SgSuffix=app \
#     AlbSuffix=01 \
#     ImageUri=<AccountId>.dkr.ecr.ap-northeast-1.amazonaws.com/my-project-dev-app:latest \
#     ContainerPort=8080
#
# ServiceSuffix examples: api, web, worker, batch, 01
#
# Prerequisites (stack names must follow convention):
#   VPC:     {ProjectName}-{Env}-vpc
#   SG:      {ProjectName}-{Env}-sg-{SgSuffix}
#   ALB:     {ProjectName}-{Env}-alb-{AlbSuffix}
#   Cluster: {ProjectName}-{Env}-ecs-cluster
#
# NOTE: Tasks run in private subnets.
#   To pull ECR images and write CloudWatch Logs, one of the following is required:
#   - NAT Gateway (cfn-nat-gateway.yaml)
#   - VPC Endpoints: com.amazonaws.{region}.ecr.api, ecr.dkr, s3, logs
#
# Deploy order:
#   1. cfn-vpc.yaml
#   2. cfn-igw.yaml
#   3. cfn-nat-gateway.yaml       (or VPC endpoints for ECR/Logs)
#   4. cfn-security-group.yaml    (SgSuffix=app — allow traffic from ALB SG on ContainerPort)
#   5. cfn-alb.yaml               (AlbSuffix=01 — TargetGroupArn is imported by this stack)
#   6. cfn-ecs-cluster.yaml
#   7. cfn-ecr.yaml + docker push
#   8. cfn-ecs-service.yaml       (this template)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - ServiceSuffix
          - SgSuffix
          - AlbSuffix
      - Label:
          default: "Container"
        Parameters:
          - SubnetType
          - ImageUri
          - ContainerPort
          - Cpu
          - Memory
      - Label:
          default: "Service"
        Parameters:
          - DesiredCount
          - LogRetentionDays
      - Label:
          default: "Permissions (optional)"
        Parameters:
          - TaskRoleArn

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd

  ServiceSuffix:
    Type: String
    Default: api
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Purpose identifier for this service (e.g. api, web, worker, 01)."

  SgSuffix:
    Type: String
    Default: app
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Must match the SgSuffix used in cfn-security-group.yaml. SG must allow ContainerPort from the ALB."

  AlbSuffix:
    Type: String
    Default: "01"
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Must match the AlbSuffix used in cfn-alb.yaml. TargetGroupArn is imported from that stack."

  SubnetType:
    Type: String
    Default: Private
    AllowedValues:
      - Private
      - Public
    Description: "Private: tasks in private subnets (requires NAT or VPC endpoints). Public: tasks in public subnets with public IP (for Docker Hub or dev use)."

  ImageUri:
    Type: String
    Default: ""
    Description: "Container image URI. ECR: 123456789012.dkr.ecr.ap-northeast-1.amazonaws.com/repo:tag. Docker Hub: nginx:alpine."

  ContainerPort:
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535
    Description: "Port the container listens on. Must match the ALB target group port."

  Cpu:
    Type: String
    Default: "256"
    AllowedValues:
      - "256"
      - "512"
      - "1024"
      - "2048"
      - "4096"
    Description: "Task CPU units. 256=0.25vCPU, 512=0.5vCPU, 1024=1vCPU, 2048=2vCPU, 4096=4vCPU."

  Memory:
    Type: String
    Default: "512"
    AllowedValues:
      - "512"
      - "1024"
      - "2048"
      - "3072"
      - "4096"
      - "8192"
      - "16384"
    Description: "Task memory (MiB). Valid combinations — 256CPU: 512/1024/2048. 512CPU: 1024-4096. 1024CPU: 2048-8192. 2048CPU: 4096-16384."

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: "Number of task instances to run."

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues:
      - 1
      - 3
      - 7
      - 14
      - 30
      - 60
      - 90
      - 180
      - 365
    Description: "CloudWatch Logs retention period in days."

  TaskRoleArn:
    Type: String
    Default: ""
    Description: "IAM role ARN granted to the running container (for AWS API access from app code). Leave empty if not needed."

# -----------------------------------------------
# Conditions
# -----------------------------------------------
Conditions:
  HasTaskRole:  !Not [!Equals [!Ref TaskRoleArn, ""]]
  IsPublicSubnet: !Equals [!Ref SubnetType, Public]

# -----------------------------------------------
# Resources
# -----------------------------------------------
Resources:
  # Task execution role — used by ECS to pull images and write logs
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Env}-ecs-${ServiceSuffix}-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}-${Env}-ecs-${ServiceSuffix}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-${Env}-ecs-${ServiceSuffix}"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !If [HasTaskRole, !Ref TaskRoleArn, !Ref AWS::NoValue]
      ContainerDefinitions:
        - Name: !Sub "${ProjectName}-${Env}-ecs-${ServiceSuffix}"
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Essential: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectName}-${Env}-ecs-${ServiceSuffix}"
      Cluster:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-ecs-cluster-ClusterName"
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-${SubnetType}Subnet01Id"
            - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-${SubnetType}Subnet02Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}-SecurityGroupId"
          AssignPublicIp: !If [IsPublicSubnet, ENABLED, DISABLED]
      LoadBalancers:
        - ContainerName: !Sub "${ProjectName}-${Env}-ecs-${ServiceSuffix}"
          ContainerPort: !Ref ContainerPort
          TargetGroupArn:
            Fn::ImportValue: !Sub "${ProjectName}-${Env}-alb-${AlbSuffix}-TargetGroupArn"
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  ServiceName:
    Description: "ECS service name"
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub "${AWS::StackName}-ServiceName"

  TaskDefinitionArn:
    Description: "Task definition ARN (latest revision)"
    Value: !Ref TaskDefinition
    Export:
      Name: !Sub "${AWS::StackName}-TaskDefinitionArn"

  LogGroupName:
    Description: "CloudWatch Log Group name"
    Value: !Ref LogGroup
    Export:
      Name: !Sub "${AWS::StackName}-LogGroupName"

AWSTemplateFormatVersion: "2010-09-09"
Description: "KMS Customer Managed Key (CMK) for symmetric encryption"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-kms \
#   --template-file cfn-kms-basic.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev
#
# Deploy order:
#   1. cfn-kms-basic.yaml (this template — no dependencies)
#   2. Other templates that use this CMK (e.g. cfn-s3-basic.yaml)
#
# Get the KMS Key ARN after deploy:
#   aws cloudformation describe-stacks \
#     --stack-name my-project-dev-kms \
#     --query "Stacks[0].Outputs[?OutputKey=='KeyArn'].OutputValue" \
#     --output text
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "Deployment environment."

# -----------------------------------------------
# Resources
# EnableKeyRotation: true automatically rotates the CMK every year (best practice).
# DeletionPolicy: Retain prevents accidental key deletion, which would make
# all encrypted data permanently inaccessible.
# The default key policy allows the root account full access.
# -----------------------------------------------
Resources:
  KmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub "CMK for ${ProjectName}-${Env}"
      EnableKeyRotation: true
      KeySpec: SYMMETRIC_DEFAULT
      KeyUsage: ENCRYPT_DECRYPT
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  KmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-${Env}"
      TargetKeyId: !Ref KmsKey

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  KeyId:
    Description: "KMS key ID"
    Value: !Ref KmsKey
    Export:
      Name: !Sub "${AWS::StackName}-KeyId"

  KeyArn:
    Description: "KMS key ARN"
    Value: !GetAtt KmsKey.Arn
    Export:
      Name: !Sub "${AWS::StackName}-KeyArn"

  AliasName:
    Description: "KMS key alias"
    Value: !Ref KmsAlias
    Export:
      Name: !Sub "${AWS::StackName}-AliasName"

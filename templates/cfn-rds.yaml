AWSTemplateFormatVersion: "2010-09-09"
Description: "RDS DB Instance (MySQL or PostgreSQL) with subnet group, encryption, and env-based settings"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-rds \
#   --template-file cfn-rds.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     SgSuffix=db \
#     DBEngine=mysql \
#     DBEngineVersion=8.0.46 \
#     DBPassword=YourSecurePassword123
#
# Prerequisites (stack names must follow convention):
#   VPC: {ProjectName}-{Env}-vpc
#   SG:  {ProjectName}-{Env}-sg-{SgSuffix}
#
# Deploy order:
#   1. cfn-vpc.yaml
#   2. cfn-security-group.yaml        (SgSuffix=db, port 3306/5432)
#   3. cfn-security-group-rules.yaml
#   4. cfn-rds.yaml                   (this template)
#
# Engine version examples (ap-northeast-1):
#   MySQL:      8.0.46 / 8.4.9
#   PostgreSQL: 17.10  / 16.14 / 15.18
#
# Check latest available versions:
#   aws rds describe-db-engine-versions --engine mysql \
#     --query "DBEngineVersions[*].EngineVersion" --output table
#   aws rds describe-db-engine-versions --engine postgres \
#     --query "DBEngineVersions[*].EngineVersion" --output table
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - SgSuffix
      - Label:
          default: "Database Engine"
        Parameters:
          - DBEngine
          - DBEngineVersion
          - DBInstanceClass
      - Label:
          default: "Database Settings"
        Parameters:
          - DBName
          - DBUsername
          - DBPassword
          - AllocatedStorage
      - Label:
          default: "Availability"
        Parameters:
          - MultiAZ
          - DeletionProtection
    ParameterLabels:
      ProjectName:
        default: "Project Name (lowercase, numbers, hyphens)"
      Env:
        default: "Environment"
      SgSuffix:
        default: "SG Suffix (e.g. db) — must match the SG stack"
      DBEngine:
        default: "Database Engine"
      DBEngineVersion:
        default: "Engine Version (e.g. 8.0.46 for MySQL, 17.10 for PostgreSQL)"
      DBInstanceClass:
        default: "DB Instance Class"
      DBName:
        default: "Initial Database Name"
      DBUsername:
        default: "Master Username"
      DBPassword:
        default: "Master Password"
      AllocatedStorage:
        default: "Allocated Storage (GiB)"
      MultiAZ:
        default: "Enable Multi-AZ (recommended for prd)"
      DeletionProtection:
        default: "Enable Deletion Protection"

# -----------------------------------------------
# Parameters
# Subnet and SG IDs are imported automatically using ProjectName + Env + SgSuffix.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    Description: "Used as the Name tag prefix. Lowercase letters, numbers, and hyphens only."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prd
    Description: "Deployment environment. prd sets DeletionPolicy to Retain and increases backup retention."

  SgSuffix:
    Type: String
    Default: db
    Description: "Must match the SgSuffix used in cfn-security-group.yaml (e.g. db)."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  DBEngine:
    Type: String
    Default: mysql
    AllowedValues:
      - mysql
      - postgres
    Description: "Database engine."

  DBEngineVersion:
    Type: String
    Default: "8.0.40"
    Description: "Engine version. Examples: 8.0.40 (MySQL 8.0), 8.4.4 (MySQL 8.4), 17.4 (PostgreSQL 17)."

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: "DB instance class."

  DBName:
    Type: String
    Default: mydb
    Description: "Name of the initial database to create."
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores."

  DBUsername:
    Type: String
    Default: admin
    Description: "Master username for the DB instance."
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    ConstraintDescription: "Must begin with a letter and contain only alphanumeric characters and underscores."

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    Description: "Master password (8-41 characters)."
    ConstraintDescription: "Must be 8 to 41 characters."

  AllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 65536
    Description: "Allocated storage in GiB. Minimum 20 GiB."

  MultiAZ:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy a standby replica in a second AZ. Recommended for prd (~2x instance cost)."

  DeletionProtection:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Prevent accidental deletion. Must be disabled before deleting the stack."

# -----------------------------------------------
# Mappings
# -----------------------------------------------
Mappings:
  EngineConfig:
    mysql:
      Port: 3306
    postgres:
      Port: 5432

# -----------------------------------------------
# Conditions
# -----------------------------------------------
Conditions:
  IsPrd: !Equals [!Ref Env, prd]

# -----------------------------------------------
# Resources
# Subnets are imported from {ProjectName}-{Env}-vpc stack.
# SG is imported from {ProjectName}-{Env}-sg-{SgSuffix} stack.
# DeletionPolicy: Retain (prd) preserves the DB after stack deletion.
# BackupRetentionPeriod: 7 days (prd) / 1 day (dev).
# -----------------------------------------------
Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "${ProjectName}-${Env}-db-subnet-group"
      DBSubnetGroupDescription: !Sub "${ProjectName}-${Env} DB subnet group"
      SubnetIds:
        - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PrivateSubnet01Id"
        - Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PrivateSubnet02Id"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-db-subnet-group"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy:      !If [IsPrd, Retain, Delete]
    UpdateReplacePolicy: !If [IsPrd, Retain, Delete]
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-${Env}-db"
      Engine:              !Ref DBEngine
      EngineVersion:       !Ref DBEngineVersion
      DBInstanceClass:     !Ref DBInstanceClass
      DBName:              !Ref DBName
      MasterUsername:      !Ref DBUsername
      MasterUserPassword:  !Ref DBPassword
      AllocatedStorage:    !Ref AllocatedStorage
      StorageType:         gp3
      StorageEncrypted:    true
      MultiAZ:             !Ref MultiAZ
      Port:                !FindInMap [EngineConfig, !Ref DBEngine, Port]
      DBSubnetGroupName:   !Ref DBSubnetGroup
      VPCSecurityGroups:
        - Fn::ImportValue: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}-SecurityGroupId"
      BackupRetentionPeriod: !If [IsPrd, 7, 1]
      DeletionProtection:    !Ref DeletionProtection
      PubliclyAccessible:    false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-db"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  DBEndpoint:
    Description: "DB instance endpoint address"
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-DBEndpoint"

  DBPort:
    Description: "DB instance port"
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-DBPort"

  DBInstanceId:
    Description: "DB instance identifier"
    Value: !Ref DBInstance
    Export:
      Name: !Sub "${AWS::StackName}-DBInstanceId"

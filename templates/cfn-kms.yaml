AWSTemplateFormatVersion: "2010-09-09"
Description: "Customer-managed KMS key for S3, EBS, RDS, EFS, CloudWatch Logs, SSM, SQS, Secrets Manager"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-kms \
#   --template-file cfn-kms-key.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev
#
# Get the key ARN for use in other stacks:
# KMS_ARN=$(aws cloudformation describe-stacks \
#   --stack-name <ProjectName>-<Env>-kms \
#   --query "Stacks[0].Outputs[?OutputKey=='KmsKeyArn'].OutputValue" \
#   --output text)
#
# Compatible services:
#   S3              - SSE-KMS bucket encryption        (KmsKeyId parameter)
#   EBS (EC2)       - encrypted EBS volumes            (KmsKeyId property)
#   RDS             - storage encryption               (KmsKeyId property)
#   EFS             - encryption at rest               (KmsKeyId property)
#   CloudWatch Logs - log group encryption             (KmsKeyId property)
#   SSM             - SecureString parameters          (KeyId property)
#   Secrets Manager - secret encryption                (KmsKeyId property)
#   SQS             - server-side encryption           (KmsMasterKeyId property)
#   DynamoDB        - table encryption at rest         (SSESpecification)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# ParameterGroups groups parameters visually.
# ParameterLabels overrides the display name shown to users.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env

# -----------------------------------------------
# Parameters
# Values passed in at deploy time.
# AllowedValues restricts accepted input.
# Default sets the fallback value when omitted.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    Description: "Used as part of the key alias. Lowercase letters, numbers, and hyphens only."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prd
    Description: "Deployment environment. prd sets DeletionPolicy to Retain and extends the pending deletion window to 30 days."

# -----------------------------------------------
# Conditions
# Boolean flags derived from parameter values.
# Used in Resources and Properties via: !If [ConditionName, IfTrue, IfFalse]
# -----------------------------------------------
Conditions:
  IsPrd: !Equals [!Ref Env, prd]

# -----------------------------------------------
# Resources
# DeletionPolicy: Retain (prd) keeps the key after stack deletion.
#                 Delete (dev) schedules key deletion with the stack.
# PendingWindowInDays: minimum 7 days required before a key is deleted.
#                      prd uses 30 days for additional safety.
# EnableKeyRotation: automatically rotates the key material every year.
# KeyPolicy: the root account principal is required in every key policy.
#            IAM policies can then delegate usage to roles and services.
# -----------------------------------------------
Resources:
  KmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy:      !If [IsPrd, Retain, Delete]
    UpdateReplacePolicy: !If [IsPrd, Retain, Delete]
    Properties:
      Description: !Sub "General-purpose encryption key for ${ProjectName}-${Env}"
      Enabled: true
      EnableKeyRotation: true
      KeySpec: SYMMETRIC_DEFAULT
      KeyUsage: ENCRYPT_DECRYPT
      PendingWindowInDays: !If [IsPrd, 30, 7]
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAdministration
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env
        - Key: Region
          Value: !Ref AWS::Region

  KmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-${Env}-kms"
      TargetKeyId: !Ref KmsKey

# -----------------------------------------------
# Outputs
# Values available after stack creation.
# Export allows other stacks to reference via !ImportValue.
# -----------------------------------------------
Outputs:
  KmsKeyArn:
    Description: "KMS key ARN"
    Value: !GetAtt KmsKey.Arn
    Export:
      Name: !Sub "${AWS::StackName}-KmsKeyArn"

  KmsKeyId:
    Description: "KMS key ID"
    Value: !Ref KmsKey
    Export:
      Name: !Sub "${AWS::StackName}-KmsKeyId"

  KmsKeyAlias:
    Description: "KMS key alias"
    Value: !Ref KmsKeyAlias
    Export:
      Name: !Sub "${AWS::StackName}-KmsKeyAlias"

AWSTemplateFormatVersion: "2010-09-09"
Description: "NAT Gateway in a public subnet with a default route in the private route table. ~$33/month."

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-nat \
#   --template-file cfn-nat.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev
#
# Prerequisite (stack name must follow convention):
#   VPC: {ProjectName}-{Env}-vpc
#
# Deploy order:
#   1. cfn-vpc.yaml   (VPC, subnets, route tables)
#   2. cfn-igw.yaml   (internet access for public subnets)
#   3. cfn-nat.yaml   (this template)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    Description: "Used as the Name tag prefix. Lowercase letters, numbers, and hyphens only."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "Deployment environment. Used as part of the Name tag."

# -----------------------------------------------
# Resources
# NAT Gateway is placed in PublicSubnet01.
# EIP provides a static outbound IP address.
# PrivateRoute sends all outbound traffic from private subnets through the NAT Gateway.
# -----------------------------------------------
Resources:
  ElasticIp01:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-nat-eip"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  NatGateway01:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt ElasticIp01.AllocationId
      SubnetId:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PublicSubnet01Id"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-ngw"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  PrivateDefaultRoute01:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId:
        Fn::ImportValue: !Sub "${ProjectName}-${Env}-vpc-PrivateRouteTableId"
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway01

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  NatGatewayId01:
    Description: "NAT Gateway ID"
    Value: !Ref NatGateway01
    Export:
      Name: !Sub "${AWS::StackName}-NatGatewayId"

  ElasticIpAddress01:
    Description: "Elastic IP address of the NAT Gateway"
    Value: !Ref ElasticIp01
    Export:
      Name: !Sub "${AWS::StackName}-EipAddress"

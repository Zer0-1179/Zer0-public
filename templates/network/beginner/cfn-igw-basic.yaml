AWSTemplateFormatVersion: "2010-09-09"
Description: "Internet Gateway attached to an existing VPC"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-igw \
#   --template-file cfn-igw-basic.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     VpcId=vpc-xxxxxxxx
#
# Prerequisites:
#   - VPC must exist beforehand.
#     Use cfn-vpc-basic.yaml if you need to create one,
#     or provide an existing VPC ID directly.
#
# Note: cfn-vpc-basic.yaml already includes an Internet Gateway.
#       Use this template only when you need to attach an IGW
#       to a VPC created outside CloudFormation.
#
# Deploy order:
#   1. (VPC must exist)
#   2. cfn-igw-basic.yaml (this template)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
      - Label:
          default: "Network"
        Parameters:
          - VpcId

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "Deployment environment."

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC ID to attach the Internet Gateway to."

# -----------------------------------------------
# Resources
# VPCGatewayAttachment links the IGW to the VPC.
# A route pointing 0.0.0.0/0 to this IGW is needed in each public subnet's route table.
# -----------------------------------------------
Resources:
  InternetGateway01:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-igw"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  VpcGatewayAttachment01:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcId
      InternetGatewayId: !Ref InternetGateway01

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  InternetGatewayId01:
    Description: "Internet Gateway ID"
    Value: !Ref InternetGateway01
    Export:
      Name: !Sub "${AWS::StackName}-IgwId"

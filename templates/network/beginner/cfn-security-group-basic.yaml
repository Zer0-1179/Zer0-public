AWSTemplateFormatVersion: "2010-09-09"
Description: "Security group with configurable inbound and outbound rules"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-sg-<SgSuffix> \
#   --template-file cfn-security-group-basic.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     SgSuffix=web \
#     VpcId=vpc-xxxxxxxx \
#     IngressPort=80 \
#     IngressCidr=0.0.0.0/0
#
# Prerequisites:
#   - VPC must exist. Use cfn-vpc-basic.yaml.
#
# Deploy order:
#   1. cfn-vpc-basic.yaml
#   2. cfn-security-group-basic.yaml (this template)
#
# To add a second inbound rule (e.g. HTTPS):
#   Copy the IngressRule01 block, rename it IngressRule02,
#   add IngressPort02 and IngressCidr02 parameters, and adjust accordingly.
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - SgSuffix
      - Label:
          default: "Network"
        Parameters:
          - VpcId
      - Label:
          default: "Inbound Rule"
        Parameters:
          - IngressPort
          - IngressCidr

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "Deployment environment."

  SgSuffix:
    Type: String
    Default: web
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Purpose identifier for this security group (e.g. web, db, cache)."

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC where the security group will be created."

  IngressPort:
    Type: Number
    Default: 80
    MinValue: 0
    MaxValue: 65535
    Description: "Port number to allow inbound traffic on."

  IngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: "Source CIDR block for the inbound rule. Use 0.0.0.0/0 for public access."

# -----------------------------------------------
# Resources
# Outbound: all traffic is allowed by default (standard AWS behavior).
# To add a second inbound rule, copy the IngressRule01 block and rename it IngressRule02.
# -----------------------------------------------
Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}"
      GroupDescription: !Sub "Security group for ${ProjectName}-${Env}-${SgSuffix}"
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-sg-${SgSuffix}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  # To add a second inbound rule, copy this block, rename it IngressRule02,
  # add IngressPort02 and IngressCidr02 parameters, and change accordingly.
  IngressRule01:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: !Ref IngressPort
      ToPort: !Ref IngressPort
      CidrIp: !Ref IngressCidr
      Description: !Sub "Allow TCP ${IngressPort} from ${IngressCidr}"

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  SecurityGroupId:
    Description: "Security group ID"
    Value: !Ref SecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"

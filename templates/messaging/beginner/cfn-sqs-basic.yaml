AWSTemplateFormatVersion: "2010-09-09"
Description: "SQS queue with SQS-managed encryption"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-sqs-<QueueSuffix> \
#   --template-file cfn-sqs-basic.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     QueueSuffix=orders
#
# Deploy order:
#   1. cfn-sqs-basic.yaml (this template — no dependencies)
#
# To add a second queue:
#   Copy the SqsQueue01 block, rename it SqsQueue02,
#   add a QueueName02 parameter, and add a corresponding output.
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - QueueSuffix
      - Label:
          default: "Queue Settings"
        Parameters:
          - VisibilityTimeout
          - MessageRetentionPeriod

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "Deployment environment."

  QueueSuffix:
    Type: String
    Default: tasks
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Purpose identifier for this queue (e.g. orders, events, tasks)."

  VisibilityTimeout:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 43200
    Description: "Visibility timeout in seconds. Set to longer than your consumer processing time."

  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    AllowedValues:
      - 60
      - 3600
      - 86400
      - 345600
      - 604800
      - 1209600
    Description: "Message retention in seconds. 345600 = 4 days (default), 1209600 = 14 days (max)."

# -----------------------------------------------
# Resources
# SqsManagedSseEnabled: true uses SQS-managed encryption at no additional cost.
# To add a second queue, copy the SqsQueue01 block and rename it SqsQueue02.
# -----------------------------------------------
Resources:
  # To add a second queue, copy this block, rename it SqsQueue02,
  # add a QueueName02 parameter, and change QueueName to !Sub "${ProjectName}-${Env}-${QueueName02}".
  SqsQueue01:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${Env}-${QueueSuffix}"
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  QueueUrl01:
    Description: "SQS queue URL"
    Value: !Ref SqsQueue01
    Export:
      Name: !Sub "${AWS::StackName}-QueueUrl01"

  QueueArn01:
    Description: "SQS queue ARN"
    Value: !GetAtt SqsQueue01.Arn
    Export:
      Name: !Sub "${AWS::StackName}-QueueArn01"

AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::LanguageExtensions
Description: "VPC with public and private subnets across 2 AZs and route tables. Deploy cfn-igw.yaml next to enable internet access."

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-vpc \
#   --template-file cfn-vpc.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev
#
# Deploy order:
#   1. cfn-vpc.yaml          (this template)
#   2. cfn-igw.yaml          (adds internet access to public subnets)
#   3. cfn-nat-gateway.yaml  (optional: adds internet access to private subnets, ~$33/month per AZ)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# Organizes the parameter input UI in the CloudFormation console.
# ParameterGroups groups parameters visually.
# ParameterLabels overrides the display name shown to users.
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
      - Label:
          default: "CIDR Blocks"
        Parameters:
          - VpcCidr
          - PublicSubnetCidrs
          - PrivateSubnetCidrs

# -----------------------------------------------
# Parameters
# Values passed in at deploy time.
# CommaDelimitedList splits a comma-separated string into a list,
# allowing Fn::Select to pick individual values by index.
# Default sets the fallback value when omitted.
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    Description: "Used as the Name tag prefix. Lowercase letters, numbers, and hyphens only."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prd
    Description: "Deployment environment. Used as part of the Name tag."

  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: "CIDR block for the VPC."
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    ConstraintDescription: "Must be a valid CIDR block (e.g. 10.0.0.0/16)."

  PublicSubnetCidrs:
    Type: CommaDelimitedList
    Default: "10.0.1.0/24,10.0.2.0/24"
    Description: "Comma-separated CIDR blocks for public subnets, one per AZ (e.g. 10.0.1.0/24,10.0.2.0/24)."

  PrivateSubnetCidrs:
    Type: CommaDelimitedList
    Default: "10.0.11.0/24,10.0.12.0/24"
    Description: "Comma-separated CIDR blocks for private subnets, one per AZ (e.g. 10.0.11.0/24,10.0.12.0/24)."

# -----------------------------------------------
# Mappings
# AZIndex maps subnet identifiers to AZ selection indices.
# Used with Fn::FindInMap inside Fn::ForEach to pick the correct AZ
# and CIDR for each subnet without duplicating resource definitions.
# -----------------------------------------------
Mappings:
  AZIndex:
    "01": { Index: 0 }
    "02": { Index: 1 }

# -----------------------------------------------
# Conditions
# Boolean flags derived from parameter values.
# -----------------------------------------------
Conditions:
  IsPrd: !Equals [!Ref Env, prd]

# -----------------------------------------------
# Resources
# Transform: AWS::LanguageExtensions enables Fn::ForEach.
# Fn::ForEach iterates over ["01", "02"] to create subnets and
# route table associations without repeating resource definitions.
# ${SubnetId} in resource logical IDs and property strings is
# replaced with the current iterator value at transform time.
# !FindInMap [AZIndex, "${SubnetId}", Index] resolves to 0 or 1,
# which is then passed to !Select to pick the correct AZ and CIDR.
# -----------------------------------------------
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-vpc"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-public-rt"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-private-rt"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

  Fn::ForEach::PublicSubnets:
    - SubnetId
    - - "01"
      - "02"
    - PublicSubnet${SubnetId}:
        Type: AWS::EC2::Subnet
        Properties:
          VpcId: !Ref VPC
          CidrBlock: !Select
            - !FindInMap [AZIndex, !Sub "${SubnetId}", Index]
            - !Ref PublicSubnetCidrs
          AvailabilityZone: !Select
            - !FindInMap [AZIndex, !Sub "${SubnetId}", Index]
            - !GetAZs ""
          MapPublicIpOnLaunch: true
          Tags:
            - Key: Name
              Value: !Sub "${ProjectName}-${Env}-public-${SubnetId}"
            - Key: Project
              Value: !Ref ProjectName
            - Key: Env
              Value: !Ref Env
            - Key: Type
              Value: public
  Fn::ForEach::PrivateSubnets:
    - SubnetId
    - - "01"
      - "02"
    - PrivateSubnet${SubnetId}:
        Type: AWS::EC2::Subnet
        Properties:
          VpcId: !Ref VPC
          CidrBlock: !Select
            - !FindInMap [AZIndex, !Sub "${SubnetId}", Index]
            - !Ref PrivateSubnetCidrs
          AvailabilityZone: !Select
            - !FindInMap [AZIndex, !Sub "${SubnetId}", Index]
            - !GetAZs ""
          MapPublicIpOnLaunch: false
          Tags:
            - Key: Name
              Value: !Sub "${ProjectName}-${Env}-private-${SubnetId}"
            - Key: Project
              Value: !Ref ProjectName
            - Key: Env
              Value: !Ref Env
            - Key: Type
              Value: private
  # Route table associations are defined outside ForEach because
  # !Ref <DynamicId> inside a loop is not resolved before pre-transform validation.
  PublicSubnet01RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet01
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet02RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet02
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnet01RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet01
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet02RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet02
      RouteTableId: !Ref PrivateRouteTable

# -----------------------------------------------
# Outputs
# Fn::ForEach in the Outputs section generates one output per subnet,
# exporting each subnet ID for use in downstream stacks.
# -----------------------------------------------
Outputs:
  VpcId:
    Description: "VPC ID"
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  VpcCidr:
    Description: "VPC CIDR block"
    Value: !GetAtt VPC.CidrBlock
    Export:
      Name: !Sub "${AWS::StackName}-VpcCidr"

  PublicRouteTableId:
    Description: "Public route table ID"
    Value: !Ref PublicRouteTable
    Export:
      Name: !Sub "${AWS::StackName}-PublicRouteTableId"

  PrivateRouteTableId:
    Description: "Private route table ID"
    Value: !Ref PrivateRouteTable
    Export:
      Name: !Sub "${AWS::StackName}-PrivateRouteTableId"

  PublicSubnet01Id:
    Description: "Public Subnet 01 ID"
    Value: !Ref PublicSubnet01
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnet01Id"

  PublicSubnet02Id:
    Description: "Public Subnet 02 ID"
    Value: !Ref PublicSubnet02
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnet02Id"

  PrivateSubnet01Id:
    Description: "Private Subnet 01 ID"
    Value: !Ref PrivateSubnet01
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet01Id"

  PrivateSubnet02Id:
    Description: "Private Subnet 02 ID"
    Value: !Ref PrivateSubnet02
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet02Id"

AWSTemplateFormatVersion: "2010-09-09"
Description: "DynamoDB table with env-based deletion policy, PITR, TTL, and optional KMS encryption"

# -----------------------------------------------
# DEPLOY
# -----------------------------------------------
# aws cloudformation deploy \
#   --stack-name <ProjectName>-<Env>-dynamodb-<TableSuffix> \
#   --template-file cfn-dynamodb.yaml \
#   --parameter-overrides \
#     ProjectName=my-project \
#     Env=dev \
#     TableSuffix=sessions \
#     PartitionKeyName=userId \
#     PartitionKeyType=S
#
# With sort key:
#   SortKeyName=createdAt \
#   SortKeyType=S
#
# With provisioned capacity:
#   BillingMode=PROVISIONED \
#   ReadCapacityUnits=5 \
#   WriteCapacityUnits=5
#
# TableSuffix examples: users, sessions, orders, logs, 01
#
# Key types:
#   S = String   N = Number   B = Binary
#
# Deploy order:
#   1. cfn-dynamodb.yaml (this template — no VPC/SG dependencies)
#   Optionally before this: cfn-kms-key.yaml (if using customer-managed KMS)
# -----------------------------------------------

# -----------------------------------------------
# Metadata
# -----------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "General"
        Parameters:
          - ProjectName
          - Env
          - TableSuffix
      - Label:
          default: "Primary Key"
        Parameters:
          - PartitionKeyName
          - PartitionKeyType
          - SortKeyName
          - SortKeyType
      - Label:
          default: "Capacity"
        Parameters:
          - BillingMode
          - ReadCapacityUnits
          - WriteCapacityUnits
      - Label:
          default: "Options"
        Parameters:
          - TtlAttributeName
          - PointInTimeRecovery
          - KmsKeyArn

# -----------------------------------------------
# Parameters
# -----------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: my-project
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Env:
    Type: String
    Default: dev
    AllowedValues:
      - stg
      - dev
      - prd
    Description: "dev: DeletionPolicy=Delete. prd: DeletionPolicy=Retain."

  TableSuffix:
    Type: String
    Default: table
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."
    Description: "Purpose identifier for this table (e.g. users, sessions, orders, 01)."

  PartitionKeyName:
    Type: String
    Default: id
    Description: "Partition key attribute name."

  PartitionKeyType:
    Type: String
    Default: S
    AllowedValues:
      - S
      - N
      - B
    Description: "Partition key type. S=String, N=Number, B=Binary."

  SortKeyName:
    Type: String
    Default: ""
    Description: "Sort key attribute name. Leave empty to create a table without a sort key."

  SortKeyType:
    Type: String
    Default: S
    AllowedValues:
      - S
      - N
      - B
    Description: "Sort key type. S=String, N=Number, B=Binary. Ignored when SortKeyName is empty."

  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PAY_PER_REQUEST
      - PROVISIONED
    Description: "PAY_PER_REQUEST: on-demand (recommended). PROVISIONED: fixed read/write capacity units."

  ReadCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    Description: "Read capacity units. Used only when BillingMode=PROVISIONED."

  WriteCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    Description: "Write capacity units. Used only when BillingMode=PROVISIONED."

  TtlAttributeName:
    Type: String
    Default: ""
    Description: "Attribute name for TTL (e.g. expiresAt). Leave empty to disable TTL."

  PointInTimeRecovery:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable point-in-time recovery. Recommended for prd."

  KmsKeyArn:
    Type: String
    Default: ""
    Description: "KMS key ARN for encryption at rest. Leave empty to use the AWS managed key (aws/dynamodb)."

# -----------------------------------------------
# Mappings
# -----------------------------------------------
Mappings:
  Config:
    dev:
      DeletionProtectionEnabled: false
    stg:
      DeletionProtectionEnabled: false
    prd:
      DeletionProtectionEnabled: true

# -----------------------------------------------
# Conditions
# -----------------------------------------------
Conditions:
  IsPrd:          !Equals [!Ref Env, prd]
  HasSortKey:     !Not [!Equals [!Ref SortKeyName, ""]]
  IsProvisioned:  !Equals [!Ref BillingMode, PROVISIONED]
  HasTtl:         !Not [!Equals [!Ref TtlAttributeName, ""]]
  HasPitr:        !Equals [!Ref PointInTimeRecovery, "true"]
  HasKmsKey:      !Not [!Equals [!Ref KmsKeyArn, ""]]

# -----------------------------------------------
# Resources
# -----------------------------------------------
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsPrd, Retain, Delete]
    UpdateReplacePolicy: !If [IsPrd, Retain, Delete]
    Properties:
      TableName: !Sub "${ProjectName}-${Env}-dynamodb-${TableSuffix}"
      BillingMode: !Ref BillingMode
      ProvisionedThroughput: !If
        - IsProvisioned
        - ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      AttributeDefinitions:
        - !If
          - HasSortKey
          - AttributeName: !Ref PartitionKeyName
            AttributeType: !Ref PartitionKeyType
          - AttributeName: !Ref PartitionKeyName
            AttributeType: !Ref PartitionKeyType
        - !If
          - HasSortKey
          - AttributeName: !Ref SortKeyName
            AttributeType: !Ref SortKeyType
          - !Ref AWS::NoValue
      KeySchema:
        - AttributeName: !Ref PartitionKeyName
          KeyType: HASH
        - !If
          - HasSortKey
          - AttributeName: !Ref SortKeyName
            KeyType: RANGE
          - !Ref AWS::NoValue
      TimeToLiveSpecification: !If
        - HasTtl
        - AttributeName: !Ref TtlAttributeName
          Enabled: true
        - !Ref AWS::NoValue
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [HasPitr, true, false]
      SSESpecification: !If
        - HasKmsKey
        - SSEEnabled: true
          SSEType: KMS
          KMSMasterKeyId: !Ref KmsKeyArn
        - SSEEnabled: true
      DeletionProtectionEnabled: !FindInMap [Config, !Ref Env, DeletionProtectionEnabled]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Env}-dynamodb-${TableSuffix}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Env
          Value: !Ref Env

# -----------------------------------------------
# Outputs
# -----------------------------------------------
Outputs:
  TableName:
    Description: "DynamoDB table name"
    Value: !Ref DynamoDBTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  TableArn:
    Description: "DynamoDB table ARN"
    Value: !GetAtt DynamoDBTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

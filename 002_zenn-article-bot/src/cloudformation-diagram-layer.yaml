AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Lambda Layer for Zenn article architecture diagram generation.
  Contains matplotlib, numpy, Pillow, and AWS official service icons.
  Used by ZennArticleGenerator (002).

Resources:
  DiagramLayer:
    Type: AWS::Lambda::LayerVersion
    DeletionPolicy: Retain
    Properties:
      LayerName: matplotlib-aws-icons
      Description: matplotlib + numpy + Pillow + AWS official icons for architecture diagram generation
      Content:
        S3Bucket: zer0-dev-s3
        S3Key: cfn-artifacts/matplotlib-aws-icons/layer.zip
      CompatibleRuntimes:
        - python3.14
      CompatibleArchitectures:
        - x86_64

Outputs:
  LayerVersionArn:
    Description: Lambda Layer ARN for diagram generation
    Value: !Ref DiagramLayer
    Export:
      Name: ZennArticleDiagramLayerArn

AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Zenn Article Auto-Generation System -
  Generates AWS beginner articles via Bedrock (Claude Haiku) every Thursday 21:00 JST
  and sends email notifications via SES

Parameters:
  SenderEmail:
    Type: String
    Description: SESで送信に使うメールアドレス（事前にSESで検証済みのもの）
  RecipientEmail:
    Type: String
    Description: 通知先メールアドレス
  BedrockModelId:
    Type: String
    Default: jp.anthropic.claude-haiku-4-5-20251001-v1:0
    Description: 使用するBedrockモデルID

Globals:
  Function:
    Runtime: python3.14
    Timeout: 900  # 15分（Lambda最大値、Bedrock記事生成に時間がかかるため）
    MemorySize: 256
    Environment:
      Variables:
        SES_SENDER_EMAIL: !Ref SenderEmail
        SES_RECIPIENT_EMAIL: !Ref RecipientEmail
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        MATPLOTLIB_BACKEND: Agg

Resources:
  # Lambda実行失敗イベントの保存先DLQ
  ArticleGeneratorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ZennArticleGenerator-DLQ
      MessageRetentionPeriod: 1209600  # 14日

  # Lambda実行ロール
  ArticleGeneratorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ZennArticleGeneratorRole-${AWS::Region}"
      Description: Lambda execution role for Zenn Article Bot (CloudWatch Logs, Bedrock, SES, S3, SSM)
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ZennArticleGeneratorPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Bedrockの呼び出し権限（基盤モデル＋クロスリージョン推論プロファイル）
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                  - !Sub "arn:aws:bedrock:ap-northeast-1:${AWS::AccountId}:inference-profile/jp.anthropic.claude-haiku-4-5-20251001-v1:0"
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
              # Marketplace推論プロファイル（Haiku 4.5）のサブスクリプション確認権限
              - Effect: Allow
                Action:
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                Resource: "*"
              # SESでのメール送信権限
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
              # S3への記事・画像保存権限
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: "arn:aws:s3:::zer0-dev-s3/zenn-articles/*"
              # SSM: 直近トピック履歴の読み書き（重複除外）
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/note-article-bot/*"
              # Lambda実行失敗時にDLQへ書き込む権限
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ArticleGeneratorDLQ.Arn

  # Lambda関数
  ArticleGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ZennArticleGenerator
      CodeUri: ./
      Handler: lambda_function.lambda_handler
      Role: !GetAtt ArticleGeneratorRole.Arn
      Layers:
        - !Ref DiagramsLayer
      Description: BedrockでAWS初心者向けZenn技術記事（アーキテクチャ図付き）を毎週木曜21時JSTに自動生成し、SESメールで通知するLambda関数
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt ArticleGeneratorDLQ.Arn
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Name: ZennArticleWeeklyTrigger
            Description: 毎週木曜21時（JST）に記事を生成
            # JST 21:00 = UTC 12:00、木曜日
            Schedule: cron(0 12 ? * THU *)
            Enabled: true
            RetryPolicy:
              MaximumRetryAttempts: 1
      Tags:
        Project: ZennArticleGenerator

  # matplotlib Lambda Layer
  DiagramsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: matplotlib-aws-icons
      Description: AWSアーキテクチャ図生成用Lambdaレイヤー（matplotlib + numpy + pillow）
      ContentUri: ../matplotlib_layer.zip
      CompatibleRuntimes:
        - python3.14
      CompatibleArchitectures:
        - x86_64

  # CloudWatch Logsのロググループ（保持期間を設定）
  ArticleGeneratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/ZennArticleGenerator"
      RetentionInDays: 14

Outputs:
  LambdaFunctionArn:
    Description: Lambda関数のARN
    Value: !GetAtt ArticleGeneratorFunction.Arn
  LambdaFunctionName:
    Description: Lambda関数名
    Value: !Ref ArticleGeneratorFunction
  EventBridgeRuleName:
    Description: EventBridgeルール名（毎週木曜21時JST）
    Value: ZennArticleWeeklyTrigger
  DLQArn:
    Description: Lambda実行失敗イベント保存先DLQのARN
    Value: !GetAtt ArticleGeneratorDLQ.Arn

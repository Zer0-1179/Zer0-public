AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Lambda Layer for Zenn mid-level article architecture diagram generation.
  Contains matplotlib, numpy, Pillow, and AWS official service icons.
  Used by ZennMidArticleGenerator (005).

Resources:
  DiagramLayerMid:
    Type: AWS::Lambda::LayerVersion
    DeletionPolicy: Retain
    Properties:
      LayerName: matplotlib-aws-icons-mid
      Description: matplotlib + numpy + Pillow + AWS official icons for mid-level article diagram generation
      Content:
        S3Bucket: zer0-dev-s3
        S3Key: cfn-artifacts/matplotlib-aws-icons-mid/layer.zip
      CompatibleRuntimes:
        - python3.14
      CompatibleArchitectures:
        - x86_64

Outputs:
  LayerVersionArn:
    Description: Lambda Layer ARN for mid-level article diagram generation
    Value: !Ref DiagramLayerMid
    Export:
      Name: ZennMidArticleDiagramLayerArn
